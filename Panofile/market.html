<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Chabang Tiko </title>

<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
:root{
--glass:rgba(0,0,0,.65);
}

body{
margin:0;
font-family:'Anuphan',sans-serif;
background:black;
overflow:hidden;
}

/* ===== IMMERSION VIGNETTE ===== */


/* ===== TOP NAV ===== */
.top-nav{
position:fixed;
top:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
pointer-events:none;
z-index:1000;
}

.btn-ui{
pointer-events:auto;
border:none;
color:white;
cursor:pointer;
backdrop-filter:blur(12px);
background:var(--glass);
border-radius:40px;
padding:10px 20px;
transition:.25s;
}

.btn-ui:hover{
transform:scale(1.05);
}

/* ===== TITLE ===== */
.title-card{
pointer-events:auto;
background:var(--glass);
padding:12px 28px;
border-radius:40px;
font-weight:600;
}

/* ===== INFO PANEL ===== */
.info-panel{
position:fixed;
bottom:40px;
left:50%;
transform:translate(-50%,40px);
opacity:0;
visibility:hidden;
background:var(--glass);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
color:white;
width:340px;
transition:.4s;
z-index:1001;
text-align:center;
}

.info-panel.active{
transform:translate(-50%,0);
opacity:1;
visibility:visible;
}

.close-btn{
background:#ff512f;
margin-top:15px;
padding:8px 22px;
border-radius:40px;
}

/* ===== HOTSPOT LABEL ===== */
.label{
background:rgba(0,0,0,.6);
padding:4px 10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="top-nav">
  <button class="btn-ui" onclick="window.location.href='index.html'">
    Back
    </button>
<div class="title-card">ตลาดนัดรอมฎอนจะบังติกอ</div>
<div style="width:70px"></div>
</div>

<div id="infoPanel" class="info-panel">
<h3 id="infoTitle"></h3>
<p id="infoDesc"></p>
<button class="btn-ui close-btn" onclick="toggleInfo(false)">ปิด</button>
</div>

<a-scene cursor="rayOrigin:mouse" raycaster="objects:.clickable">

<a-assets>
<img id="sky" src="panorama/Market.jpg">
<img id="pin" src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
</a-assets>

<a-sky src="#sky" rotation="0 300 0"></a-sky>

<a-entity camera look-controls="dampingFactor:0.08"></a-entity>

<!-- ===== HOTSPOT GROUP ===== -->
<a-entity position="4 -3 -5">

<a-image
class="clickable"
src="#pin"
scale="0.55 0.55 0.55"
animation="property:scale;dir:alternate;dur:900;loop:true;to:0.65 0.65 0.65"
event-set__enter="scale:0.8 0.8 0.8"
event-set__leave="scale:0.55 0.55 0.55"
onclick="showData('วังจะบังติกอ','ตลาดนัดรอมฎอนจะบังติกอ เป็นแหล่งรวมอาหารคาวหวานและอาหารพื้นเมืองหาทานยากช่วงเดือนถือศีลอด คึกคักมากช่วงบ่าย 2-6 โมงเย็นตลอดเดือนรอมฎอน')">
</a-image>

<a-text 
value="ตลาดนัดรอมฎอนจะบังติกอ"
position="0 -0.8 0"
align="center"
color="#ffd54f"
width="4"
class="label">
</a-text>

</a-entity>

</a-scene>

<script>

const panel=document.getElementById("infoPanel");
const title=document.getElementById("infoTitle");
const desc=document.getElementById("infoDesc");

function showData(name,detail){
title.innerText=name;
desc.innerText=detail;
panel.classList.add("active");
}

function toggleInfo(){
panel.classList.remove("active");
}

</script>

</body>
</html>
